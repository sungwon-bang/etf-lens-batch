name: ETF 배치 수집

on:
  schedule:
    - cron: '0 0 * * *'
  
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 클론
        uses: actions/checkout@v3

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 의존성 설치
        run: npm install

      - name: ETF 데이터 수집
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          KRX_LOGIN_ID: ${{ secrets.KRX_LOGIN_ID }}
          KRX_LOGIN_PASSWORD: ${{ secrets.KRX_LOGIN_PASSWORD }}
        run: npm run collect

      - name: 변경사항 커밋 & 푸시
        run: |
          git config --global user.name "ETF Bot"
          git config --global user.email "bot@etf-lens.com"
          
          if git diff --quiet etf-data.json; then
            echo "데이터 변경 없음"
          else
            git add etf-data.json
            git commit -m "Update ETF data - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          fi
