name: ETF 정오 배치 수집

on:
  schedule:
    # GitHub 예약 실행은 지연될 수 있어 11:30 KST에 요청한다.
    - cron: '30 2 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'batch-collector.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/batch-collect-with-playwright.yml'

permissions:
  contents: write

concurrency:
  group: etf-daily-batch
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 저장소 클론
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 의존성 설치
        run: npm ci

      - name: KRX 전체 ETF 데이터 수집
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: npm run collect

      - name: 변경사항 커밋 & 푸시
        run: |
          if git diff --quiet -- etf-data.json; then
            echo "ETF 데이터 변경 없음"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add etf-data.json
          git commit -m "data: update daily ETF snapshot"
          git push
