name: ETF 배치 수집 (Playwright)

on:
  schedule:
    - cron: '0 3 * * *'  # 매일 정오 12시 (UTC+9)
  
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6시간

    steps:
      - name: 저장소 클론
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Playwright 브라우저 설치
        run: npx playwright install chromium

      - name: 의존성 설치
        run: npm install

      - name: ETF 데이터 수집 (KRX PDF 추출)
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          KRX_LOGIN_ID: ${{ secrets.KRX_LOGIN_ID }}
          KRX_LOGIN_PASSWORD: ${{ secrets.KRX_LOGIN_PASSWORD }}
        run: node batch-collector.js

      - name: 변경사항 커밋 & 푸시
        run: echo "✅ ETF 데이터 수집 완료"
