name: ETF PDF 야간 전체 수집

on:
  schedule:
    # 매일 23:30 KST = 14:30 UTC
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: etf-pdf-nightly-batch
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: 저장소 클론
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 의존성 설치
        run: npm ci

      - name: Chromium 설치
        run: npx playwright install --with-deps chromium

      - name: 전체 ETF PDF 구성종목 수집
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          KRX_LOGIN_ID: ${{ secrets.KRX_LOGIN_ID }}
          KRX_LOGIN_PASSWORD: ${{ secrets.KRX_LOGIN_PASSWORD }}
          CHECKPOINT_SIZE: '25'
        run: npm run collect

      - name: 최종 결과 커밋
        if: always()
        run: |
          if git diff --quiet -- data/etf-compositions.json; then
            echo "추가 변경 없음"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/etf-compositions.json
          git commit -m "data: finalize ETF PDF collection"
          git push
