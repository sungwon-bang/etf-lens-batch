name: ETF PDF 야간 배치 수집

on:
  schedule:
    # 매일 23:30 KST = 14:30 UTC. GitHub 예약 실행은 혼잡 시 지연될 수 있다.
    - cron: '30 14 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'krx-worker.js'
      - 'krx-auto-login.js'
      - 'krx-etf-download.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/batch-collect-with-playwright.yml'

permissions:
  contents: read

concurrency:
  group: etf-pdf-nightly-batch
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 저장소 클론
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: Chromium 설치
        run: npx playwright install --with-deps chromium

      - name: 요청된 PDF 구성종목 수집
        env:
          KRX_LOGIN_ID: ${{ secrets.KRX_LOGIN_ID }}
          KRX_LOGIN_PASSWORD: ${{ secrets.KRX_LOGIN_PASSWORD }}
          ETF_SITE_URL: ${{ secrets.ETF_SITE_URL }}
          ETF_SITE_TOKEN: ${{ secrets.ETF_SITE_TOKEN }}
          MAX_PDF_JOBS: '100'
        run: npm run collect
